<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Loom">
<title>Loom</title>
<script src="firebase-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Plus+Jakarta+Sans:wght@200;300;400&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ivory:#FAFAF6;--mint:#85D4D8;--mint-light:#D4F0F1;--mint-dark:#4A9EA2;
  --text:#2C2C2A;--muted:#888780;--border:rgba(44,44,42,0.12);--white:#fff;
}
html,body{min-height:100%;background:var(--ivory);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0;border-bottom:0.5px solid var(--border);background:var(--ivory);position:sticky;top:0;z-index:100}
.logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px}
.tabs{display:flex}
.tab{font-size:11px;font-weight:300;letter-spacing:.08em;padding:8px 11px 12px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .15s,border-color .15s}
.tab.active{color:var(--text);border-bottom-color:var(--mint)}
.nav-right{display:flex;align-items:center;gap:8px}
.date-badge{font-size:11px;color:var(--muted)}
.settings-btn{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border);background:none;cursor:pointer;color:var(--muted);font-size:13px;transition:all .15s}
.settings-btn:hover{border-color:var(--mint);color:var(--mint-dark)}
.page{display:none;padding:18px;max-width:760px;margin:0 auto}
.page.active{display:block}
.sec-label{font-size:10px;font-weight:400;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.section{margin-bottom:1.8rem}
/* COUNTDOWN */
.cd-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.8rem}
.cd-card{border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;background:var(--white);position:relative;overflow:hidden}
.cd-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.cd-title{font-family:'DM Sans',sans-serif;font-weight:300;font-size:12px;color:var(--muted);margin-bottom:4px;font-style:normal}
.cd-num{font-size:36px;font-weight:200;letter-spacing:-.02em;line-height:1;font-family:'Plus Jakarta Sans',sans-serif}
.cd-unit{font-size:10px;color:var(--muted);letter-spacing:.1em;margin-top:3px}
.cd-date{font-size:10px;color:var(--muted);margin-top:6px}
/* HABITS */
.habit-list{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.habit-check{display:flex;align-items:center;gap:10px;border:0.5px solid var(--border);border-radius:10px;padding:10px 14px;background:var(--white);cursor:pointer;transition:border-color .15s,background .15s}
.habit-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.habit-name{font-size:13px;font-weight:300;flex:1}
.habit-streak{font-size:10px;color:var(--muted)}
.chk{width:20px;height:20px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:transparent;transition:all .15s}
.circle-row{display:flex;gap:6px;justify-content:space-between;margin-top:4px}
.day-col{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1}
.day-lbl{font-size:9px;color:var(--muted);letter-spacing:.05em}
.legend-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.leg-dot{width:8px;height:8px;border-radius:50%}
/* TIMEBLOCK */
.tb-date-label{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:300}
.tb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mode-toggle{display:flex;border:0.5px solid var(--border);border-radius:8px;overflow:hidden;background:var(--white)}
.mode-btn{font-size:11px;font-weight:300;font-family:'DM Sans',sans-serif;padding:5px 11px;border:none;background:none;cursor:pointer;color:var(--muted);transition:all .15s}
.mode-btn.active{background:var(--mint-light);color:var(--mint-dark)}
.tb-legend{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tb-leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.tb-leg-dot{width:8px;height:8px;border-radius:2px}
.timeline-wrap{display:flex;border:0.5px solid var(--border);border-radius:12px;overflow:hidden;background:var(--white)}
.time-col{width:42px;flex-shrink:0;border-right:0.5px solid var(--border)}
.time-tick{height:48px;display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 7px 0 0;font-size:9px;color:var(--muted)}
.blocks-col{flex:1;position:relative;cursor:crosshair}
.hour-row{height:48px;border-bottom:0.5px solid var(--border)}
.hour-row:last-child{border-bottom:none}
.half-line{position:absolute;top:24px;left:0;right:0;border-bottom:0.5px dashed rgba(44,44,42,.06)}
.tb-block{position:absolute;left:4px;right:4px;border-radius:6px;padding:3px 7px;cursor:pointer;z-index:2;overflow:hidden}
.tb-block:hover .tb-del{opacity:.7}
.tb-label{font-size:11px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-time{font-size:9px;opacity:.7;margin-top:1px}
.tb-del{position:absolute;top:3px;right:5px;font-size:10px;opacity:0;transition:opacity .15s;cursor:pointer;background:none;border:none;color:inherit}
.empty-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:rgba(136,135,128,.45);pointer-events:none;text-align:center;line-height:1.8}
/* milestone strip in timeline */
.ms-strip{position:absolute;left:0;right:0;height:2px;z-index:3;pointer-events:none}
.ms-strip-label{position:absolute;right:6px;top:-14px;font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap}
.cat-picker{border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-top:10px;background:var(--white)}
.cat-picker-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.cat-btn{border:0.5px solid var(--border);border-radius:7px;padding:7px 4px;background:none;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:300;color:var(--text);transition:all .15s;text-align:center}
.cat-btn.selected{border-width:1.5px}
.name-row{display:flex;gap:6px;margin-top:8px}
.name-input{flex:1;border:0.5px solid var(--border);border-radius:7px;padding:6px 10px;font-size:12px;font-weight:300;font-family:'DM Sans',sans-serif;background:var(--ivory);color:var(--text);outline:none}
.name-input:focus{border-color:var(--mint)}
.confirm-btn{border:0.5px solid var(--mint);border-radius:7px;padding:6px 14px;background:var(--mint-light);color:var(--mint-dark);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer}
.confirm-btn:hover{background:var(--mint);color:#fff}
.cancel-btn{border:0.5px solid var(--border);border-radius:7px;padding:6px 10px;background:none;color:var(--muted);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer}
/* FOCUS */
.focus-card{border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;background:var(--white)}
.focus-week{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--muted);margin-bottom:10px}
.focus-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border)}
.focus-item:last-of-type{border-bottom:none}
.fcb{width:16px;height:16px;border-radius:4px;border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s}
.focus-item.checked .fcb{background:var(--mint);border-color:var(--mint);color:#fff}
.focus-text{font-size:13px;font-weight:300;flex:1}
.focus-item.checked .focus-text{color:var(--muted);text-decoration:line-through}
.small-btn{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:300;letter-spacing:.04em;padding:8px 0 0;display:block}
.small-btn:hover{color:var(--mint-dark)}
/* WEEKLY */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.week-range{font-size:12px;color:var(--muted)}
.week-grid-wrap{border:0.5px solid var(--border);border-radius:12px;overflow:auto;background:var(--white)}
.week-grid{display:grid;grid-template-columns:44px repeat(7,1fr);min-width:520px}
.week-head{border-bottom:0.5px solid var(--border);padding:8px 4px;text-align:center;position:relative}
.week-dow{font-size:10px;letter-spacing:.07em;color:var(--muted)}
.week-dnum{font-size:15px;font-weight:200;color:var(--text);margin-top:2px}
.week-dnum.today{color:var(--mint-dark);font-weight:400}
.week-ms-dot{width:6px;height:6px;border-radius:50%;margin:3px auto 0}
.week-cell{border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);min-height:52px;padding:4px}
.week-cell:nth-child(7n+1){border-right:none}
.week-time-cell{border-bottom:0.5px solid var(--border);padding:0 6px;display:flex;align-items:center;justify-content:flex-end}
.week-time-label{font-size:9px;color:var(--muted)}
.week-cell textarea{width:100%;height:44px;background:none;border:none;font-size:11px;font-weight:300;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;resize:none;line-height:1.4}
.week-cell textarea::placeholder{color:rgba(136,135,128,.3)}
.week-ms-tag{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* MONTHLY */
.cal-wrap{border:0.5px solid var(--border);border-radius:12px;overflow:hidden;background:var(--white)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:0.5px solid var(--border)}
.cal-title{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:18px}
.cal-nav{display:flex;gap:6px}
.cal-nav-btn{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border);background:none;cursor:pointer;font-size:12px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{border-color:var(--mint);color:var(--mint-dark)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;font-size:10px;letter-spacing:.08em;color:var(--muted);padding:8px 0;border-bottom:0.5px solid var(--border)}
.cal-day{min-height:68px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);padding:6px;cursor:pointer;transition:background .1s}
.cal-day:nth-child(7n){border-right:none}
.cal-day:hover{background:rgba(133,212,216,.06)}
.cal-day.other .day-num{color:rgba(136,135,128,.3)}
.cal-day.today .day-num{background:var(--mint);color:#fff;border-radius:50%}
.day-num{font-size:12px;font-weight:300;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.day-event{font-size:10px;font-weight:500;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* DAY DETAIL MODAL */
.day-modal{display:none;position:fixed;inset:0;background:rgba(250,250,246,.9);z-index:300;align-items:center;justify-content:center}
.day-modal.open{display:flex}
.day-modal-inner{background:var(--white);border:0.5px solid var(--border);border-radius:16px;width:92%;max-width:480px;max-height:80vh;overflow-y:auto;padding:20px}
.day-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.day-modal-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px}
.day-modal-close{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--border);background:none;cursor:pointer;font-size:13px;color:var(--muted)}
.day-block-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px;font-weight:300}
.day-block-item:last-child{border-bottom:none}
.day-block-bar{width:3px;height:32px;border-radius:2px;flex-shrink:0}
/* PROJECTS */
.proj-list{display:flex;flex-direction:column;gap:6px}
.proj-row{display:flex;align-items:center;gap:10px;border:0.5px solid var(--border);border-radius:10px;padding:10px 14px;background:var(--white)}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proj-name{font-size:13px;font-weight:300;flex:1}
.proj-tag{font-size:10px;padding:3px 8px;border-radius:20px;white-space:nowrap}
.proj-note{font-size:11px;color:var(--muted);text-align:right;min-width:70px}
.roadmap-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.roadmap-row:last-child{border-bottom:none}
/* SETTINGS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(250,250,246,.9);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border:0.5px solid var(--border);border-radius:16px;width:92%;max-width:520px;max-height:88vh;overflow-y:auto;padding:24px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px}
.modal-close{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border);background:none;cursor:pointer;font-size:14px;color:var(--muted)}
.modal-sec{margin-bottom:18px}
.modal-sec-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.edit-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.edit-input{flex:1;border:0.5px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;font-weight:300;font-family:'DM Sans',sans-serif;background:var(--ivory);color:var(--text);outline:none;min-width:0}
.edit-input:focus{border-color:var(--mint)}
.color-pick{width:32px;height:32px;border-radius:7px;border:0.5px solid var(--border);padding:2px;cursor:pointer;flex-shrink:0}
.del-btn{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--border);background:none;cursor:pointer;font-size:12px;color:var(--muted);flex-shrink:0;transition:all .15s}
.del-btn:hover{border-color:#E24B4A;color:#E24B4A}
.add-btn{width:100%;border:0.5px dashed var(--border);border-radius:8px;padding:8px;font-size:12px;font-weight:300;font-family:'DM Sans',sans-serif;color:var(--muted);background:none;cursor:pointer;transition:all .15s}
.add-btn:hover{border-color:var(--mint);color:var(--mint-dark)}
.save-btn{width:100%;border:0.5px solid var(--mint);border-radius:8px;padding:10px;font-size:13px;font-weight:300;font-family:'DM Sans',sans-serif;color:var(--mint-dark);background:var(--mint-light);cursor:pointer;margin-top:6px}
.save-btn:hover{background:var(--mint);color:#fff}
.gcal-hint{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:8px}
@media(max-width:600px){
  .cd-num{font-size:28px}
  .tabs .tab{padding:8px 8px 12px;font-size:10px}
  .page{padding:10px}
  /* monthly calendar mobile fix */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-day{min-height:60px;height:60px;padding:4px 3px;overflow:hidden}
  .cal-dow{font-size:9px;padding:6px 0}
  .day-num{font-size:10px;width:18px;height:18px}
  .day-event{font-size:8px;padding:1px 3px;margin-bottom:1px}
  .leg-dot{width:5px;height:5px}
  /* habit grid mobile: 1 column */
  .habit-list{grid-template-columns:1fr}
  /* circle row mobile */
  .circle-row{gap:2px}
  .day-col{gap:3px}
  /* nav */
  .nav-arrow-btn{width:32px;height:32px}
  /* weekly grid */
  .week-grid{grid-template-columns:36px repeat(7,1fr)}
}
/* TOGGLE SECTION */
.toggle-section{margin-bottom:1.4rem}
.toggle-header{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;user-select:none}
.toggle-arrow{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0;display:inline-block}
.toggle-arrow.open{transform:rotate(90deg)}
.toggle-title{font-size:10px;font-weight:400;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.toggle-body{overflow:hidden}
.toggle-body.collapsed{display:none}
/* NOTION EDITOR */
.notion-list{display:flex;flex-direction:column;gap:1px;padding:4px 0}
.notion-row{display:flex;align-items:flex-start;gap:6px;padding:3px 4px;border-radius:6px;position:relative;transition:background .1s}
.notion-row:hover{background:rgba(44,44,42,.04)}
.notion-row.dragging-row{opacity:.35}
.notion-row.drag-over-top{border-top:2px solid var(--mint)}
.drag-handle{font-size:12px;color:rgba(136,135,128,.25);cursor:grab;padding-top:3px;flex-shrink:0;opacity:0;transition:opacity .1s;line-height:1}
.notion-row:hover .drag-handle{opacity:1}
.notion-cell{flex:1;min-width:0;outline:none;font-size:13px;font-weight:300;font-family:'DM Sans',sans-serif;line-height:1.6;border:none;background:none;padding:0;word-break:break-word;white-space:pre-wrap;cursor:text}
.notion-cell:empty::before{content:attr(data-placeholder);color:rgba(136,135,128,.35);pointer-events:none}
.notion-toolbar{display:none;position:absolute;right:4px;top:0px;gap:3px;background:var(--white);border:0.5px solid var(--border);border-radius:7px;padding:3px 6px;z-index:10;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.notion-row:focus-within .notion-toolbar,.notion-row:hover .notion-toolbar{display:flex}
.toolbar-btn{font-size:11px;background:none;border:none;cursor:pointer;color:var(--muted);padding:2px 4px;border-radius:4px;font-family:'DM Sans',sans-serif;transition:background .1s;line-height:1}
.toolbar-btn:hover{background:rgba(44,44,42,.06);color:var(--text)}
/* TODO */
.todo-list{display:flex;flex-direction:column;gap:2px;padding:4px 0}
.todo-row{display:flex;align-items:flex-start;gap:8px;padding:4px 6px;border-radius:6px;position:relative}
.todo-row:hover{background:rgba(44,44,42,.04)}
.todo-row.dragging-row{opacity:.35}
.todo-row.drag-over-top{border-top:2px solid var(--mint)}
.todo-cb{width:16px;height:16px;border-radius:4px;border:1px solid var(--border);flex-shrink:0;margin-top:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s}
.todo-cb.done{background:var(--mint);border-color:var(--mint);color:#fff}
.todo-text{flex:1;outline:none;font-size:13px;font-weight:300;font-family:'DM Sans',sans-serif;line-height:1.6;border:none;background:none;padding:0;min-width:0;cursor:text}
.todo-text:empty::before{content:'Add task...';color:rgba(136,135,128,.35);pointer-events:none}
.todo-drag{font-size:12px;color:rgba(136,135,128,.25);cursor:grab;padding-top:3px;flex-shrink:0;opacity:0;transition:opacity .1s}
.todo-row:hover .todo-drag{opacity:1}
.todo-del{opacity:0;background:none;border:none;cursor:pointer;font-size:11px;color:var(--muted);padding:0 2px;flex-shrink:0;margin-top:2px}
.todo-row:hover .todo-del{opacity:.4}
.section-card{border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;background:var(--white)}
/* PALETTE POPUP */
.daily-date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px}
.daily-date-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:var(--text)}
.daily-date-sub{font-size:10px;color:var(--muted);letter-spacing:.06em;margin-top:1px}
.nav-arrow-btn{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border);background:none;cursor:pointer;font-size:13px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.nav-arrow-btn:hover{border-color:var(--mint);color:var(--mint-dark)}
/* drag-to-spin date input */
.spin-date-wrap{position:relative;display:inline-flex;align-items:center;gap:4px}
.spin-date-wrap input[type=date]{cursor:ns-resize}

function showLoginScreen(){

  overlay.innerHTML=`
    <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:36px;color:var(--text)">Loom</div>
    <div style="font-size:13px;font-weight:300;color:var(--muted);font-family:'DM Sans',sans-serif">나만의 스케줄 대시보드</div>
    <button id="googleLoginBtn" style="display:flex;align-items:center;gap:10px;border:0.5px solid var(--border);border-radius:10px;padding:12px 24px;background:var(--white);cursor:pointer;font-size:13px;font-weight:300;font-family:'DM Sans',sans-serif;color:var(--text);margin-top:8px;transition:border-color .15s">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6C12.3 13 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z"/><path fill="#FBBC05" d="M10.4 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.9-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-4.2-13.5-10l-7.8 6C6.5 42.6 14.6 48 24 48z"/></svg>
      Google로 로그인
    </button>
    <div id="loginError" style="font-size:11px;color:#E24B4A;display:none;font-family:'DM Sans',sans-serif"></div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('googleLoginBtn').onclick=async()=>{
    try{
      const provider=new GoogleAuthProvider();
      await signInWithPopup(auth,provider);
    }catch(e){
      const err=document.getElementById('loginError');
      if(err){err.textContent='로그인 실패: '+e.message;err.style.display='block';}
    }
  };
}

if(auth){
  onAuthStateChanged(auth, user=>{
    if(user){
      UID=user.uid;
      const overlay=document.getElementById('loginOverlay');
      if(overlay)overlay.remove();
      if(!document.getElementById('logoutBtn')){
        const btn=document.createElement('button');
        btn.id='logoutBtn';
        btn.style.cssText='font-size:10px;color:var(--muted);background:none;border:0.5px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:DM Sans,sans-serif';
        btn.textContent='로그아웃';
        btn.onclick=()=>signOut(auth);
        document.querySelector('.nav-right').prepend(btn);
      }
      init();
    } else {
      UID=null;
      showLoginScreen();
    }
  });
} else {
  UID='local';
  const overlay=document.getElementById('loginOverlay');
  if(overlay)overlay.remove();
  init();
}

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekKey(dateStr){const d=dateStr?new Date(dateStr+'T00:00:00'):new Date(),jan=new Date(d.getFullYear(),0,1);return d.getFullYear()+'_w'+Math.ceil((((d-jan)/86400000)+jan.getDay()+1)/7);}
function ls(k){return localStorage.getItem('loom_'+k);}
function lsSet(k,v){localStorage.setItem('loom_'+k,typeof v==='string'?v:JSON.stringify(v));}
async function dbSet(path,val){if(db){try{await set(ref(db,UID+'/'+path),val);}catch(e){}}lsSet(path,val);}
async function dbGet(path){if(db){try{const s=await get(ref(db,UID+'/'+path));return s.exists()?s.val():null;}catch(e){}}const v=ls(path);if(!v)return null;try{return JSON.parse(v);}catch{return v;}}
function dbListen(path,cb){if(db){onValue(ref(db,UID+'/'+path),s=>cb(s.exists()?s.val():null));return;}const v=ls(path);cb(v?(()=>{try{return JSON.parse(v);}catch{return v;}})():null);}

async function init(){
  const [h,p,m,tb,tc]=await Promise.all([dbGet('habits'),dbGet('projects'),dbGet('milestones'),dbGet('tb_blocks_'+tbDate),dbGet('tb_cats')]);
  if(h)habits=h;if(p)projects=p;if(m)milestones=m;if(tb)tbBlocks=tb;if(tc)TB_CATS=tc;
  // init date picker
  const dp=document.getElementById('tbDatePicker');
  dp.value=tbDate;
  dp.addEventListener('change',e=>{tbDate=e.target.value;loadTBForDate();});
  const badge=document.getElementById('userBadge');
  if(badge&&UID!=='jueun')badge.textContent='@'+UID;
  setDate();renderCountdown();
  renderHabits();renderCircles();
  buildTimeline();renderTBLegend();renderTBBlocks();
  renderFocus();renderTodo();renderProjects();renderWeekly();renderMonthly();renderEPRoadmap();loadGcal();
  renderFocusAutoItems();
  initDragSpinDates();
  dbListen('habits',v=>{if(v){habits=v;renderHabits();renderCircles();}});
  dbListen('projects',v=>{if(v){projects=v;renderProjects();}});
  dbListen('milestones',v=>{if(v){milestones=v;renderCountdown();renderMonthly();renderEPRoadmap();renderFocusAutoItems();}});
  // 날짜별 데이터 실시간 리스닝
  function listenDailyData(date){
    if(!db)return;
    // habit checks
    habits.forEach(h=>{
      onValue(ref(db,UID+'/habit_'+h.id+'_'+date),s=>{
        if(s.exists())lsSet('habit_'+h.id+'_'+date,s.val());
        if(date===dailyDate){renderHabits();renderCircles();}
      });
    });
    // timeblocks
    onValue(ref(db,UID+'/tb_blocks_'+date),s=>{
      if(s.exists()){lsSet('tb_blocks_'+date,JSON.stringify(s.val()));if(date===tbDate){tbBlocks=s.val();renderTBBlocks();}}
    });
    // todo
    onValue(ref(db,UID+'/todo_'+date),s=>{
      if(s.exists()){lsSet('todo_'+date,JSON.stringify(s.val()));if(date===dailyDate)renderTodo();}
    });
    // calendar memo
    onValue(ref(db,UID+'/cal_'+date),s=>{
      if(s.exists())lsSet('cal_'+date,s.val());
    });
  }
  // 오늘 + 최근 7일 리스닝
  for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);listenDailyData(fmtDate(d));}
  // focus (주차별)
  if(db){
    onValue(ref(db,UID+'/'+getWkFocusKey()),s=>{
      if(s.exists()){lsSet(getWkFocusKey(),JSON.stringify(s.val()));renderFocus();}
    });
  }
  const ms2=new Date(new Date().getFullYear(),new Date().getMonth(),new Date().getDate()+1)-new Date();
  setTimeout(()=>{
    dailyDate=today();tbDate=today();
    const dp=document.getElementById('tbDatePicker');if(dp)dp.value=tbDate;
    setDate();renderCountdown();renderHabits();renderCircles();renderTodo();renderFocus();
  },ms2);
}

/* ── DRAG-SPIN DATE INPUTS ── */
function initDragSpinDates(){
  function getSegmentByX(inp, clientX){
    const rect=inp.getBoundingClientRect();
    const w=rect.width;
    const x=clientX-rect.left;
    // date input 너비를 3등분: 앞쪽=년, 중간=월, 뒤쪽=일
    if(x < w*0.4) return 'year';
    if(x < w*0.65) return 'month';
    return 'day';
  }
  function applySpinToAll(){
    document.querySelectorAll('input[type=date]').forEach(inp=>{
      if(inp._spinApplied)return;inp._spinApplied=true;
      let startY=null,startVal=null,draggingDate=false,segment='day';

      function onMove(e){
        if(startY===null)return;
        const dy=startY-e.clientY;
        if(!draggingDate){
          if(Math.abs(dy)<12)return;
          draggingDate=true;
        }
        e.preventDefault();
        const steps=Math.round(dy/12);
        if(!steps)return;
        const d=new Date((startVal||today())+'T00:00:00');
        if(segment==='year') d.setFullYear(d.getFullYear()+steps);
        else if(segment==='month') d.setMonth(d.getMonth()+steps);
        else d.setDate(d.getDate()+steps);
        const nv=fmtDate(d);
        if(nv!==inp.value){inp.value=nv;inp.dispatchEvent(new Event('change',{bubbles:true}));}
      }
      function onUp(){
        startY=null;startVal=null;draggingDate=false;
        window.removeEventListener('mousemove',onMove);
        window.removeEventListener('mouseup',onUp);
      }
      inp.addEventListener('mousedown',e=>{
        segment=getSegmentByX(inp, e.clientX);
        startY=e.clientY;startVal=inp.value||today();draggingDate=false;
        window.addEventListener('mousemove',onMove,{passive:false});
        window.addEventListener('mouseup',onUp);
      });
    });
  }
  applySpinToAll();
  new MutationObserver(applySpinToAll).observe(document.body,{childList:true,subtree:true});
}

  '아침':{sh:7,sm:0,eh:9,em:0},
  '오전':{sh:9,sm:0,eh:12,em:0},
  '오후':{sh:13,sm:0,eh:16,em:0},
  '저녁':{sh:17,sm:0,eh:19,em:0},
  '밤':{sh:20,sm:0,eh:22,em:0},
};
function getWeeklyBlocksForDate(ds){
  const blocks=[];
  WEEK_ROWS.forEach(row=>{
    const v=ls('weekly_'+ds+'_'+row);
    if(v&&v.trim()){
      const times=WEEK_ROW_TIMES[row];
      blocks.push({...times,cat:'__weekly__',name:v.trim(),isWeekly:true});
    }
  });
  return blocks;
}
window.setTBDate=offset=>{
  const d=new Date();d.setDate(d.getDate()+offset);
  tbDate=fmtDate(d);
  document.getElementById('tbDatePicker').value=tbDate;
  loadTBForDate();
};

function setDate(){
  const d=new Date();
  document.getElementById('dateStr').textContent=d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+DOWS_SUN[d.getDay()];
  renderDailyDateNav();
}
function renderDailyDateNav(){
  const todayStr=today();
  const d=new Date(dailyDate+'T00:00:00');
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const label=document.getElementById('dailyDateLabel');
  const sub=document.getElementById('dailyDateSub');
  if(!label)return;
  const diff=Math.round((new Date(dailyDate+'T00:00:00')-new Date(todayStr+'T00:00:00'))/(86400000));
  const relStr=diff===0?'Today':diff===-1?'Yesterday':diff===1?'Tomorrow':'';
  label.textContent=`${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  sub.textContent=relStr?relStr+' · '+DOWS_SUN[d.getDay()]:DOWS_SUN[d.getDay()];
}
window.shiftDailyDate=dir=>{

/* ── COUNTDOWN ── */
function renderCountdown(){
  const now=new Date();now.setHours(0,0,0,0);
  function diff(dateStr){
    const t=new Date(dateStr);
    return Math.ceil((t-now)/86400000);
  }
  const grid=document.getElementById('cdGrid');grid.innerHTML='';
  const colors=['single','ep','ep','single'];
  const dotColors=['#85D4D8','#A8C4A8','#E8B8A0','#A8C0C8'];
  milestones.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach((ms,i)=>{
    const d=diff(ms.date);
    const card=document.createElement('div');card.className='cd-card';
    card.style.cssText=`border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;background:var(--white);position:relative;overflow:hidden`;
    const bar=document.createElement('div');bar.style.cssText=`position:absolute;top:0;left:0;width:3px;height:100%;background:${ms.color}`;
    card.appendChild(bar);
    const numStr=d<0?'Done':d===0?'D-day':'D-'+d;
    card.innerHTML+=`<div class="cd-title">${ms.label}</div><div class="cd-num" style="color:${d<0?'var(--muted)':d===0?ms.color:'var(--text)'}">${numStr}</div><div class="cd-date">${ms.date}</div>`;
    grid.appendChild(card);
  });
}

const PALETTE=['#FFEDA2','#D6D35F','#80B0E8','#4282AA','#BDD7DE','#FFC0C0','#E9ACBB','#8FBC93','#85D4D8','#C5B4E8'];
function showPalette(anchorEl,currentColor,onPick){
  document.querySelectorAll('.palette-popup').forEach(e=>e.remove());
  const pop=document.createElement('div');pop.className='palette-popup';
  PALETTE.forEach(c=>{
    const sw=document.createElement('div');sw.className='palette-swatch'+(c===currentColor?' active':'');
    sw.style.background=c;
    sw.onclick=e=>{e.stopPropagation();onPick(c);pop.remove();};
    pop.appendChild(sw);
  });
  document.body.appendChild(pop);
  const rect=anchorEl.getBoundingClientRect();
  pop.style.position='fixed';
  pop.style.top=(rect.bottom+4)+'px';
  pop.style.left=rect.left+'px';
  setTimeout(()=>document.addEventListener('click',()=>pop.remove(),{once:true}),10);
}

/* ── PIE CIRCLES ── */
function degToRad(d){return d*Math.PI/180;}
function pieSlice(cx,cy,r,s,e,color){
  const x1=cx+r*Math.cos(degToRad(s)),y1=cy+r*Math.sin(degToRad(s));
  const x2=cx+r*Math.cos(degToRad(e)),y2=cy+r*Math.sin(degToRad(e));
  return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${e-s>180?1:0},1 ${x2},${y2} Z" fill="${color}"/>`;
}
function makePie(done,isToday,isFuture,size=70){
  const cx=size/2,cy=size/2,r=size/2-1.5,slice=360/Math.max(habits.length,1);
  const fillA=isFuture?'.02':'.04';
  const strokeA=isToday?'.25':isFuture?'.05':'.1';
  const strokeW=isToday?'1.5':'0.5';
  let paths=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(44,44,42,${fillA})" stroke="rgba(44,44,42,${strokeA})" stroke-width="${strokeW}"/>`;
  if(!isFuture) done.forEach(h=>{const idx=habits.findIndex(hab=>hab.id===h.id),s=idx*slice-90,e=s+slice;if(idx>=0)paths+=pieSlice(cx,cy,r,s,e,h.color+'CC');});
  if(isToday)paths+=`<circle cx="${cx}" cy="${cy}" r="2.5" fill="rgba(44,44,42,.2)"/>`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
}
function renderCircles(){
  const now=new Date();
  const todayStr=today();
  const dow=now.getDay();
  const diffToMon=dow===0?-6:1-dow;
  const mon=new Date(now);mon.setDate(now.getDate()+diffToMon);

  const wr=document.getElementById('circleRow');wr.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const ds=fmtDate(d);
    const isFuture=ds>todayStr;
    const isToday=ds===todayStr;
    const done=habits.filter(h=>ls('habit_'+h.id+'_'+ds)==='1');
    const col=document.createElement('div');col.className='day-col';
    col.innerHTML=`<div class="day-lbl">${DOWS_MON[i]}</div>${makePie(done,isToday,isFuture,70)}`;
    wr.appendChild(col);
  }
  const leg=document.getElementById('habitLegend');leg.innerHTML='';
  habits.forEach(h=>{const el=document.createElement('div');el.className='leg';el.innerHTML=`<div class="leg-dot" style="background:${h.color}CC"></div>${h.name}`;leg.appendChild(el);});
}

function initLegendDrag(wrap, type){
  let dragIdx=null;
  wrap.addEventListener('dragstart',e=>{
    const row=e.target.closest('[draggable]');if(!row)return;
    dragIdx=parseInt(row.dataset.idx);row.style.opacity='.4';
  });
  wrap.addEventListener('dragover',e=>{
    e.preventDefault();
    const row=e.target.closest('[draggable]');if(!row)return;
    wrap.querySelectorAll('[draggable]').forEach(r=>r.style.outline='');
    row.style.outline='1.5px solid var(--mint)';
    row.style.outlineOffset='1px';
  });
  wrap.addEventListener('dragleave',()=>{
    wrap.querySelectorAll('[draggable]').forEach(r=>{r.style.outline='';});
  });
  wrap.addEventListener('drop',e=>{
    e.preventDefault();
    wrap.querySelectorAll('[draggable]').forEach(r=>{r.style.opacity='1';r.style.outline='';});
    const row=e.target.closest('[draggable]');if(!row||dragIdx===null)return;
    const targetIdx=parseInt(row.dataset.idx);
    if(dragIdx===targetIdx){dragIdx=null;return;}
    if(type==='cat'){
      const [moved]=TB_CATS.splice(dragIdx,1);TB_CATS.splice(targetIdx,0,moved);dbSet('tb_cats',TB_CATS);
    } else {
      const [moved]=projects.splice(dragIdx,1);projects.splice(targetIdx,0,moved);dbSet('projects',projects);renderProjects();
    }
    dragIdx=null;renderTBLegend();renderTBBlocks();
  });
  wrap.addEventListener('dragend',()=>{
    wrap.querySelectorAll('[draggable]').forEach(r=>{r.style.opacity='1';r.style.outline='';});
    dragIdx=null;
  });
}
function buildTimeline(){
  const tc=document.getElementById('timeCol'),bc=document.getElementById('blocksCol');
  tc.innerHTML='';bc.querySelectorAll('.hour-row,.ms-strip').forEach(e=>e.remove());
  HOURS.forEach(h=>{
    const tick=document.createElement('div');tick.className='time-tick';tick.textContent=h+':00';tc.appendChild(tick);
    const row=document.createElement('div');row.className='hour-row';
    const half=document.createElement('div');half.className='half-line';row.appendChild(half);
    bc.appendChild(row);
  });

}
function pxToTime(px){const mins=Math.round((px/HOUR_H)*60/30)*30,tot=START_H*60+mins,h=Math.floor(tot/60),m=tot%60;return{h,m};}
function snapPx(px){const t=pxToTime(px);return timeToPx(t.h,t.m);}
function timeToPx(h,m){return((h-START_H)*60+m)/60*HOUR_H;}
function fmt(h,m){return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function getRelY(e){const bc=document.getElementById('blocksCol'),rect=bc.getBoundingClientRect(),cy=e.touches?e.touches[0].clientY:e.clientY;return Math.max(0,Math.min(cy-rect.top,HOURS.length*HOUR_H));}

function getWeekRange(){
  const base=dailyDate?new Date(dailyDate+'T00:00:00'):new Date();
  const dow=base.getDay(),diffToMon=dow===0?-6:1-dow;
  const mon=new Date(base);mon.setDate(base.getDate()+diffToMon);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  // 월 기준 주차 (1일이 속한 주 = 1주차)
  const firstOfMonth=new Date(base.getFullYear(),base.getMonth(),1);
  const firstDow=firstOfMonth.getDay()===0?6:firstOfMonth.getDay()-1;
  const weekOfMonth=Math.ceil((base.getDate()+firstDow)/7);
  return `${base.getMonth()+1}월 ${weekOfMonth}주차 (${mon.getMonth()+1}/${mon.getDate()} – ${sun.getMonth()+1}/${sun.getDate()})`;
}

function makeFocusRow(item,i,items){
  const row=document.createElement('div');row.className='notion-row';row.dataset.idx=i;
  const cell=document.createElement('div');
  cell.className='notion-cell';cell.contentEditable='true';

  cell.innerHTML=item.text||'';
  cell.addEventListener('focus',()=>{focusEditing=true;});
  cell.addEventListener('blur',()=>{focusEditing=false;items[i].text=cell.innerHTML;saveFocusItems(items);});
  let isComposing=false;
  cell.addEventListener('compositionstart',()=>{isComposing=true;});
  cell.addEventListener('compositionend',()=>{isComposing=false;items[i].text=cell.innerHTML;saveFocusItems(items);});
  cell.addEventListener('input',()=>{if(!isComposing){items[i].text=cell.innerHTML;saveFocusItems(items);}});
  cell.addEventListener('blur',()=>{items[i].text=cell.innerHTML;saveFocusItems(items);});
  cell.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();items.splice(i+1,0,{text:'',color:'',bold:false});saveFocusItems(items);renderFocus();setTimeout(()=>{const rows=document.querySelectorAll('#focusList .notion-cell');if(rows[i+1])rows[i+1].focus();},30);}
    if(e.key==='Backspace'&&cell.innerHTML===''&&items.length>1){e.preventDefault();items.splice(i,1);saveFocusItems(items);renderFocus();setTimeout(()=>{const rows=document.querySelectorAll('#focusList .notion-cell');if(rows[Math.max(0,i-1)])rows[Math.max(0,i-1)].focus();},30);}
  });
  const handle=document.createElement('div');handle.className='drag-handle';handle.textContent='⠿';handle.draggable=true;
  const toolbar=document.createElement('div');toolbar.className='notion-toolbar';
  toolbar.innerHTML=`
    <button class="toolbar-btn" onclick="toggleFocusBold(${i})" title="Bold" style="font-weight:500">B</button>
    <button class="toolbar-btn" onclick="deleteFocusRow(${i})" title="Delete">✕</button>
  `;
  row.appendChild(handle);row.appendChild(cell);row.appendChild(toolbar);
  return row;
}

window.toggleFocusBold=i=>{const items=getFocusItems();items[i].bold=!items[i].bold;saveFocusItems(items);renderFocus();};

function makeTodoRow(t,i,todos){

  text.addEventListener('keydown',e=>{

    if(e.key==='Backspace'&&text.innerHTML===''&&todos.length>1){e.preventDefault();todos.splice(i,1);saveTodos(todos);renderTodo();setTimeout(()=>{const rows=document.querySelectorAll('#todoList .todo-text');if(rows[Math.max(0,i-1)])rows[Math.max(0,i-1)].focus();},30);}

/* ── DRAG TO REORDER ── */
function initDrag(list,type){
  let dragIdx=null;
  list.querySelectorAll('[draggable=true]').forEach(handle=>{
    const row=handle.closest('.notion-row,.todo-row');
    if(!row)return;
    handle.addEventListener('dragstart',e=>{
      dragIdx=parseInt(row.dataset.idx);
      row.classList.add('dragging-row');
      e.dataTransfer.effectAllowed='move';
    });
  });
  list.querySelectorAll('.notion-row,.todo-row').forEach(row=>{
    row.addEventListener('dragover',e=>{e.preventDefault();list.querySelectorAll('.drag-over-top').forEach(r=>r.classList.remove('drag-over-top'));row.classList.add('drag-over-top');});
    row.addEventListener('dragleave',()=>row.classList.remove('drag-over-top'));
    row.addEventListener('drop',e=>{
      e.preventDefault();row.classList.remove('drag-over-top');
      const targetIdx=parseInt(row.dataset.idx);
      if(dragIdx===null||dragIdx===targetIdx)return;
      if(type==='focus'){
        const items=getFocusItems();const [moved]=items.splice(dragIdx,1);items.splice(targetIdx,0,moved);saveFocusItems(items);renderFocus();
      } else {
        const todos=getTodos();const [moved]=todos.splice(dragIdx,1);todos.splice(targetIdx,0,moved);saveTodos(todos);renderTodo();
      }
      dragIdx=null;
    });
    row.addEventListener('dragend',()=>{row.classList.remove('dragging-row');list.querySelectorAll('.drag-over-top').forEach(r=>r.classList.remove('drag-over-top'));dragIdx=null;});
  });
}

/* ── PROJECTS ── */
function isThisWeek(dateStr){
  if(!dateStr)return false;
  const now=new Date(),dow=now.getDay(),diffToMon=dow===0?-6:1-dow;
  const mon=new Date(now);mon.setDate(now.getDate()+diffToMon);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  const d=new Date(dateStr);return d>=mon&&d<=sun;
}

    tag.contentEditable='true';

    const row=document.createElement('div');
    row.className='focus-auto-item';
    row.style.cssText=`display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px;font-size:12px;font-weight:300;color:${item.color}`;
    row.innerHTML=`<div style="width:6px;height:6px;border-radius:50%;background:${item.color};flex-shrink:0"></div>${item.text}`;
    list.appendChild(row);
  });
}

/* ── WEEKLY ── */
function getWeekDays(){
  const now=new Date(),dow=now.getDay(),diffToMon=dow===0?-6:1-dow;
  const mon=new Date(now);mon.setDate(now.getDate()+diffToMon+weekOffset*7);
  const days=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d);}
  return days;
}
function renderWeekly(){
  const days=getWeekDays();
  const first=days[0],last=days[6];
  document.getElementById('weekRange').textContent=`${first.getMonth()+1}/${first.getDate()} – ${last.getMonth()+1}/${last.getDate()}`;
  const grid=document.getElementById('weekGrid');grid.innerHTML='';
  const msMap={};milestones.forEach(ms=>{msMap[ms.date]=ms;});
  const projDlMap={};projects.forEach(p=>{if(p.deadline){if(!projDlMap[p.deadline])projDlMap[p.deadline]=[];projDlMap[p.deadline].push(p);}});
  const corner=document.createElement('div');corner.className='week-head';grid.appendChild(corner);
  days.forEach((d,i)=>{
    const ds=fmtDate(d),isToday=ds===today(),ms=msMap[ds],projs=projDlMap[ds]||[];
    const div=document.createElement('div');div.className='week-head';
    let tags=ms?`<div class="week-ms-tag" style="background:${ms.color}22;color:${ms.color}">${ms.label}</div>`:'';
    projs.forEach(p=>{tags+=`<div class="week-ms-tag" style="background:${p.dot}22;color:${p.dot}">${p.name}</div>`;});
    div.innerHTML=`<div class="week-dow">${DOWS_MON[i]}</div><div class="week-dnum${isToday?' today':''}">${d.getDate()}</div>${tags}`;
    grid.appendChild(div);
  });
  WEEK_ROWS.forEach(row=>{
    const lbl=document.createElement('div');lbl.className='week-time-cell';lbl.innerHTML=`<span class="week-time-label">${row}</span>`;grid.appendChild(lbl);
    days.forEach(d=>{
      const ds=fmtDate(d),k='weekly_'+ds+'_'+row,saved=ls(k)||'';
      const cell=document.createElement('div');cell.className='week-cell';
      cell.innerHTML=`<textarea placeholder="${row}...">${saved}</textarea>`;
      cell.querySelector('textarea').addEventListener('input',e=>{lsSet(k,e.target.value);dbSet(k,e.target.value);if(ds===tbDate)renderTBBlocks();});
      grid.appendChild(cell);
    });
  });
}
window.shiftWeek=dir=>{weekOffset=dir===0?0:weekOffset+dir;renderWeekly();};

/* ── MONTHLY ── */
function renderMonthly(){
  const y=currentMonth.getFullYear(),m=currentMonth.getMonth();
  document.getElementById('calMonthTitle').textContent=y+'년 '+(m+1)+'월';
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach(d=>{const div=document.createElement('div');div.className='cal-dow';div.textContent=d;grid.appendChild(div);});
  const firstDay=new Date(y,m,1).getDay(); // 0=일
  const daysInMonth=new Date(y,m+1,0).getDate(),todayStr=today();
  const msMap={};milestones.forEach(ms=>{msMap[ms.date]=ms;});
  const projDlMap={};projects.forEach(p=>{if(p.deadline){if(!projDlMap[p.deadline])projDlMap[p.deadline]=[];projDlMap[p.deadline].push(p);}});
  const prevDays=new Date(y,m,0).getDate();
  for(let i=firstDay-1;i>=0;i--){const div=document.createElement('div');div.className='cal-day other';div.innerHTML=`<div class="day-num">${prevDays-i}</div>`;grid.appendChild(div);}
  for(let d=1;d<=daysInMonth;d++){
    const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=ds===todayStr;
    const div=document.createElement('div');div.className='cal-day'+(isToday?' today':'');
    div.innerHTML=`<div class="day-num">${d}</div>`;
    if(msMap[ds]){const ms=msMap[ds],tag=document.createElement('div');tag.className='day-event';tag.style.background=ms.color+'66';tag.style.color='#5A6070';tag.style.fontWeight='500';tag.style.opacity='.88';tag.textContent=ms.label;div.appendChild(tag);}
    (projDlMap[ds]||[]).forEach(p=>{const tag=document.createElement('div');tag.className='day-event';tag.style.background=p.dot+'55';tag.style.color='#5A6070';tag.style.fontWeight='500';tag.style.opacity='.88';tag.textContent='⊙ '+p.name;div.appendChild(tag);});
    const k='cal_'+ds,saved=ls(k)||'';
    if(saved){const e=document.createElement('div');e.className='day-event';e.style.background='rgba(133,212,216,.15)';e.style.color='var(--mint-dark)';e.style.fontWeight='400';e.textContent=saved;div.appendChild(e);}
    const tbKey='tb_blocks_'+ds,tbData=ls(tbKey);
    // 타임블록 있으면 작은 선으로 표시 (dot 제거)
    
    // habit dots
    const habitsDone=habits.filter(h=>ls('habit_'+h.id+'_'+ds)==='1');
    if(habitsDone.length>0){
      const dotsWrap=document.createElement('div');
      dotsWrap.style.cssText='display:flex;gap:3px;margin-top:3px;flex-wrap:wrap';
      habitsDone.forEach(h=>{
        const dot=document.createElement('div');
        dot.style.cssText=`width:6px;height:6px;border-radius:50%;background:${h.color};flex-shrink:0`;
        dotsWrap.appendChild(dot);
      });
      div.appendChild(dotsWrap);
    }
    div.addEventListener('click',()=>{
      dailyDate=ds;tbDate=ds;
      const dp=document.getElementById('tbDatePicker');if(dp)dp.value=ds;
      switchTab('daily');
      renderDailyDateNav();
      renderHabits();renderCircles();
      loadTBForDate();
      renderTodo();
      // focus week도 해당 주차로 업데이트
      renderFocus();
      window.scrollTo(0,0);
    });
    grid.appendChild(div);
  }
  const total=firstDay+daysInMonth,rem=(7-(total%7))%7;
  for(let i=1;i<=rem;i++){const div=document.createElement('div');div.className='cal-day other';div.innerHTML=`<div class="day-num">${i}</div>`;grid.appendChild(div);}
}
window.shiftMonth=dir=>{if(dir===0)currentMonth=new Date();else currentMonth.setMonth(currentMonth.getMonth()+dir);renderMonthly();};

/* ── DAY DETAIL MODAL ── */
function openDayModal(ds){
  document.getElementById('dayModalTitle').textContent=ds;
  const content=document.getElementById('dayModalContent');content.innerHTML='';
  const msMap={};milestones.forEach(ms=>{msMap[ms.date]=ms;});
  // milestone
  if(msMap[ds]){const ms=msMap[ds];const el=document.createElement('div');el.style.cssText=`background:${ms.color}22;color:${ms.color};padding:6px 10px;border-radius:6px;font-size:12px;margin-bottom:10px`;el.textContent='★ '+ms.label;content.appendChild(el);}
  // memo
  const memo=ls('cal_'+ds)||'';
  const memoWrap=document.createElement('div');memoWrap.style.marginBottom='12px';
  memoWrap.innerHTML=`<div style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">메모</div>`;
  const memoInput=document.createElement('textarea');
  memoInput.value=memo;memoInput.placeholder='메모 추가...';
  memoInput.style.cssText='width:100%;border:0.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;font-weight:300;font-family:DM Sans,sans-serif;background:var(--ivory);color:var(--text);outline:none;resize:none;height:60px;line-height:1.5';
  memoInput.addEventListener('input',e=>{lsSet('cal_'+ds,e.target.value);dbSet('cal_'+ds,e.target.value);renderMonthly();});
  memoWrap.appendChild(memoInput);content.appendChild(memoWrap);
  // timeblocks
  const tbData=ls('tb_blocks_'+ds);
  if(tbData){try{
    const blocks=JSON.parse(tbData);
    if(blocks.length>0){
      const tbWrap=document.createElement('div');
      tbWrap.innerHTML=`<div style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">타임 블록</div>`;
      const allItems=[...TB_CATS,...projects.map(p=>({id:p.name,label:p.name,color:p.dot}))];
      blocks.forEach(b=>{
        const cat=allItems.find(c=>c.id===b.cat)||{label:b.cat,color:'#888'};
        const row=document.createElement('div');row.className='day-block-item';
        row.innerHTML=`<div class="day-block-bar" style="background:${cat.color}"></div><div style="flex:1"><div style="font-size:13px;font-weight:300">${b.name||cat.label}</div><div style="font-size:10px;color:var(--muted)">${fmt(b.sh,b.sm)}–${fmt(b.eh,b.em)}</div></div>`;
        tbWrap.appendChild(row);
      });
      content.appendChild(tbWrap);
    }
  }catch(e){}}
  // habits
  const habitsDone=habits.filter(h=>ls('habit_'+h.id+'_'+ds)==='1');
  if(habitsDone.length>0){
    const hWrap=document.createElement('div');hWrap.style.marginTop='12px';
    hWrap.innerHTML=`<div style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">완료한 습관</div>`;
    habitsDone.forEach(h=>{const el=document.createElement('div');el.style.cssText=`display:inline-flex;align-items:center;gap:5px;margin:3px;font-size:11px;padding:3px 8px;border-radius:12px;background:${h.color}22;color:${h.color}`;el.innerHTML=`<span style="width:6px;height:6px;border-radius:50%;background:${h.color};display:inline-block"></span>${h.name}`;hWrap.appendChild(el);});
    content.appendChild(hWrap);
  }
  document.getElementById('dayModal').classList.add('open');
}
window.closeDayModal=()=>document.getElementById('dayModal').classList.remove('open');
document.getElementById('dayModal').addEventListener('click',e=>{if(e.target===document.getElementById('dayModal'))window.closeDayModal();});

/* ── EP ROADMAP ── */
function renderEPRoadmap(){
  const el=document.getElementById('epRoadmap'),now=new Date();now.setHours(0,0,0,0);
  el.innerHTML='';
  const sorted=[...milestones].sort((a,b)=>a.date.localeCompare(b.date));
  sorted.forEach((ms,si)=>{
    const origIdx=milestones.indexOf(ms);
    const t=new Date(ms.date),d=Math.ceil((t-now)/86400000);
    const isPast=d<0,isT=d===0,dStr=isPast?'Done':isT?'D-day':'D-'+d;
    const row=document.createElement('div');row.className='roadmap-row';
    // color dot — palette
    const dotWrap=document.createElement('div');
    dotWrap.style.cssText=`width:12px;height:12px;border-radius:50%;background:${isPast?'var(--border)':ms.color};flex-shrink:0;cursor:pointer`;
    dotWrap.onclick=e=>{e.stopPropagation();showPalette(dotWrap,ms.color,c=>{milestones[origIdx].color=c;dotWrap.style.background=c;badge.style.color=c;dbSet('milestones',milestones);renderCountdown();renderWeekly();renderMonthly();renderFocusAutoItems();});};
    // label
    const label=document.createElement('div');
    label.contentEditable='true';
    label.style.cssText=`flex:1;font-size:13px;font-weight:300;color:${isPast?'var(--muted)':'var(--text)'};outline:none;cursor:text`;
    label.textContent=ms.label;
    label.addEventListener('blur',()=>{milestones[origIdx].label=label.textContent.trim();dbSet('milestones',milestones);renderCountdown();renderWeekly();renderMonthly();renderFocusAutoItems();});
    label.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();label.blur();}});
    // date
    const dateInput=document.createElement('input');dateInput.type='date';dateInput.value=ms.date;
    dateInput.style.cssText='border:none;background:none;font-size:10px;color:var(--text);font-family:DM Sans,sans-serif;font-weight:400;outline:none;cursor:pointer;width:110px;flex-shrink:0';
    dateInput.addEventListener('change',e=>{milestones[origIdx].date=e.target.value;dbSet('milestones',milestones);renderEPRoadmap();renderCountdown();renderWeekly();renderMonthly();renderFocusAutoItems();});
    // d-day badge
    const badge=document.createElement('div');
    badge.style.cssText=`font-size:11px;font-weight:${isPast?300:400};color:${isPast?'var(--muted)':ms.color};flex-shrink:0;min-width:44px;text-align:right`;
    badge.textContent=dStr;
    // del btn
    const del=document.createElement('button');
    del.style.cssText='background:none;border:none;cursor:pointer;font-size:11px;color:var(--muted);opacity:0;padding:0 2px;flex-shrink:0;transition:opacity .15s';
    del.textContent='✕';del.title='Delete';
    del.onclick=()=>{milestones.splice(origIdx,1);dbSet('milestones',milestones);renderEPRoadmap();renderCountdown();renderWeekly();renderMonthly();renderFocusAutoItems();};
    row.addEventListener('mouseenter',()=>del.style.opacity='.4');
    row.addEventListener('mouseleave',()=>del.style.opacity='0');
    row.appendChild(dotWrap);row.appendChild(label);row.appendChild(dateInput);row.appendChild(badge);row.appendChild(del);
    el.appendChild(row);
  });
  // add button
  const addBtn=document.createElement('button');
  addBtn.style.cssText='display:block;width:100%;margin-top:8px;border:0.5px dashed var(--border);border-radius:7px;padding:6px;font-size:11px;font-weight:300;font-family:DM Sans,sans-serif;color:var(--muted);background:none;cursor:pointer';
  addBtn.textContent='+ Add milestone';
  addBtn.onclick=()=>{milestones.push({date:today(),label:'New milestone',color:'#85D4D8'});dbSet('milestones',milestones);renderEPRoadmap();renderCountdown();renderFocusAutoItems();};
  el.appendChild(addBtn);
}

/* ── GCAL ── */
function loadGcal(){const url=ls('gcal_url');if(url){document.getElementById('gcalSection').style.display='block';document.getElementById('gcalFrame').src=url;}}

/* ── SETTINGS ── */
window.openSettings=()=>{
  document.getElementById('habitEditList').innerHTML=habits.map((h,i)=>`<div class="edit-row"><input class="color-pick" type="color" value="${h.color}" id="hc${i}"><input class="edit-input" value="${h.name}" id="hn${i}"><button class="del-btn" onclick="delHabit(${i})">✕</button></div>`).join('');
  document.getElementById('projEditList').innerHTML=projects.map((p,i)=>`<div class="edit-row"><input type="color" class="color-pick" value="${p.dot}" id="pd${i}"><input class="edit-input" value="${p.name}" id="pn${i}" style="flex:2"><input class="edit-input" value="${p.tag}" id="pt${i}" style="flex:1"><input class="edit-input" value="${p.note}" id="pno${i}" style="flex:1.5"><button class="del-btn" onclick="delProj(${i})">✕</button></div>`).join('');
  document.getElementById('msEditList').innerHTML=milestones.map((ms,i)=>`<div class="edit-row"><input type="date" class="edit-input" value="${ms.date}" id="md${i}"><input class="edit-input" value="${ms.label}" id="ml${i}" style="flex:2"><input type="color" class="color-pick" value="${ms.color}" id="mc${i}"><button class="del-btn" onclick="delMs(${i})">✕</button></div>`).join('');
  document.getElementById('gcalUrlInput').value=ls('gcal_url')||'';
  document.getElementById('settingsModal').classList.add('open');
};
window.closeSettings=()=>document.getElementById('settingsModal').classList.remove('open');
window.addHabit=()=>{habits.push({id:'h'+Date.now(),name:'New habit',color:'#85D4D8'});window.openSettings();};
window.delHabit=i=>{habits.splice(i,1);window.openSettings();};
window.addCat=()=>{TB_CATS.push({id:'c'+Date.now(),label:'New category',color:'#85D4D8'});window.openSettings();};
window.delCat=i=>{TB_CATS.splice(i,1);window.openSettings();};
window.addProject=()=>{projects.push({name:'New project',dot:'#85D4D8',tag:'In progress',note:'—'});window.openSettings();};
window.delProj=i=>{projects.splice(i,1);window.openSettings();};
window.addMilestone=()=>{milestones.push({date:today(),label:'New milestone',color:'#85D4D8'});window.openSettings();};
window.delMs=i=>{milestones.splice(i,1);window.openSettings();};
window.saveSettings=async()=>{
  habits=habits.map((h,i)=>({...h,color:document.getElementById('hc'+i)?.value||h.color,name:document.getElementById('hn'+i)?.value||h.name}));
  projects=projects.map((p,i)=>({...p,dot:document.getElementById('pd'+i)?.value||p.dot,name:document.getElementById('pn'+i)?.value||p.name,tag:document.getElementById('pt'+i)?.value||p.tag,note:document.getElementById('pno'+i)?.value||p.note}));
  milestones=milestones.map((ms,i)=>({date:document.getElementById('md'+i)?.value||ms.date,label:document.getElementById('ml'+i)?.value||ms.label,color:document.getElementById('mc'+i)?.value||ms.color}));
  const gcalUrl=document.getElementById('gcalUrlInput').value.trim();if(gcalUrl)lsSet('gcal_url',gcalUrl);
  await Promise.all([dbSet('habits',habits),dbSet('projects',projects),dbSet('milestones',milestones),dbSet('tb_cats',TB_CATS)]);
  window.closeSettings();
  renderCountdown();renderHabits();renderCircles();renderProjects();renderWeekly();renderMonthly();renderEPRoadmap();loadGcal();renderTBLegend();buildTimeline();renderTBBlocks();
};
window.switchTab=tab=>{
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
};

</script>
